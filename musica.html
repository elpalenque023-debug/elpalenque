<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>El Palenque - Música</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
padding:30px;
text-align:center;
}

.card{

max-width:700px;

margin:auto;

background:#1d1d1d;

padding:30px;

border-radius:20px;

}

input{

width:90%;

padding:16px;

border:none;

border-radius:12px;

font-size:16px;

}

button{

margin-top:20px;

padding:16px;

width:250px;

border:none;

border-radius:12px;

background:#d89d30;

font-weight:bold;

cursor:pointer;

}

.item{

background:#2a2a2a;

padding:14px;

margin:10px;

border-radius:12px;

}

a{

color:#d89d30;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<h1>🎵 EL PALENQUE</h1>

<p>
Agrega una canción
(1 cada 15 minutos)
</p>

<input
id="song"
placeholder="Nombre o link de YouTube">

<br>

<button
onclick="agregarCancion()">

Agregar a la cola

</button>

<div id="resultado"></div>

<br>

<h3>Cola actual</h3>

<div id="cola">

<div class="item">

Todavía no hay canciones

</div>

</div>

<br>

<a href="/">

← Volver al inicio

</a>

</div>

<script>

let canciones=[];

function agregarCancion(){

let valor=
document
.getElementById(
"song"
)
.value;

if(!valor){

alert(
"Ingresa una canción"
);

return;

}

canciones.push(valor);

document
.getElementById(
"resultado"
)
.innerHTML=

"✅ Canción agregada";

render();

document
.getElementById(
"song"
)
.value="";

}

function render(){

let html="";

for(
let i=0;
i<canciones.length;
i++
){

html+=`

<div class="item">

#${i+1}

🎵

${canciones[i]}

</div>

`;

}

document
.getElementById(
"cola"
)
.innerHTML=
html;

}

</script>

</body>

</html>
```
