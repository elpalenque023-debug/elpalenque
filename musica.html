<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>EL PALENQUE</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:50px;
}

.card{
max-width:700px;
margin:auto;
background:#1b1b1b;
padding:30px;
border-radius:20px;
}

a{
display:block;
margin:20px auto;
padding:18px;
max-width:320px;
border-radius:14px;
background:#d89d30;
color:black;
text-decoration:none;
font-weight:bold;
}

h1{
color:#d89d30;
}

</style>

</head>

<body>

<div class="card">

<h1>🍻 EL PALENQUE</h1>

<h2 id="mesa"></h2>

<p>Un lugar para compartir</p>

<a href="/">
🍔 Ver catálogo
</a>

<a
id="musicaBtn"
href="/musica.html">

🎵 Pedir canción

</a>

<a
href="https://wa.me/573105644863">

📱 Pedir por WhatsApp

</a>

</div>

<script>

const url =
new URLSearchParams(
window.location.search
);

const mesa =

url.get(
"id"
)

||

"General";

document
.getElementById(
"mesa"
)
.innerText=
mesa;

document
.getElementById(
"musicaBtn"
)
.href=

"/musica.html?mesa="

+

encodeURIComponent(
mesa
);

</script>

</body>

</html>
